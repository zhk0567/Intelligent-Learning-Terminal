# assemble（含 Release + R8）与多模块 Kotlin 编译较吃内存；提高堆与元空间，避免 Metaspace OOM
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8
# 降低并行 Worker 峰值，减少同一时刻编译进程/类加载压力
org.gradle.workers.max=2
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Kotlin daemon 在部分 IDE 环境会启动即退出；改为进程内编译提高稳定性
kotlin.compiler.execution.strategy=in-process

# 真机调试：在 Android Studio 运行配置中选择已连接的 USB/无线调试设备即可，无需模拟器。
